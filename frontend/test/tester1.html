<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeptCarbon API Tester</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; }
        button { 
            padding: 10px 20px; font-size: 16px; cursor: pointer;
            background-color: #2c3e50; color: white; border: none; border-radius: 4px;
        }
        button:hover { background-color: #34495e; }
        textarea { 
            width: 100%; height: 400px; margin-top: 20px; 
            font-family: monospace; padding: 10px; border: 1px solid #ccc;
        }
        .status { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Rubber Plantation Carbon API Tester</h2>
    <p>Click the button to load <code>test.json</code> and POST it to the backend.</p>
    
    <button id="testBtn">Test API</button>
    <div id="statusLabel" class="status"></div>
    
    <textarea id="responseArea" readonly placeholder="API Response will appear here..."></textarea>
</div>

<script>
    const API_ENDPOINT = 'http://localhost:8000/api/v1/plantation-info';
    const JSON_FILE = 'test1.json';

    document.getElementById('testBtn').addEventListener('click', async () => {
        const responseArea = document.getElementById('responseArea');
        const statusLabel = document.getElementById('statusLabel');
        
        statusLabel.innerText = "Processing...";
        statusLabel.style.color = "orange";
        responseArea.value = "";

        try {
            // 1. Read JSON from local file
            const fileResponse = await fetch(JSON_FILE);
            console.log("Fetching JSON file:", JSON_FILE, "Status:", fileResponse.status);  
            
            if (!fileResponse.ok) throw new Error("Could not find test.json file.");
            const jsonData = await fileResponse.json();

            // 2. POST to the FastAPI backend
            const apiResponse = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(jsonData)
            });

            const result = await apiResponse.json();

            // 3. Display Results
            if (apiResponse.ok) {
                statusLabel.innerText = "Success!";
                statusLabel.style.color = "green";
                responseArea.value = JSON.stringify(result, null, 4);
            } else {
                statusLabel.innerText = "API Error: " + apiResponse.status;
                statusLabel.style.color = "red";
                responseArea.value = JSON.stringify(result, null, 4);
            }

        } catch (error) {
            statusLabel.innerText = "System Error";
            statusLabel.style.color = "red";
            responseArea.value = error.message;
        }
    });
</script>

</body>
</html>
