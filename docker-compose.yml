networks:
  keptcarbon:
    name: keptcarbon

services:
  # ── Next.js application ────────────────────────
  nextjs:
    build:
      context: ./nextjs
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_API_URL: ${NEXT_PUBLIC_BACKEND_API_URL}
    ports:
      - "3000:3000"
    container_name: keptcarbon-nextjs
    networks:
      - keptcarbon
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LINE_CHANNEL_ID=${LINE_CHANNEL_ID}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - LINE_CALLBACK_URL=${LINE_CALLBACK_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_BACKEND_API_URL=${NEXT_PUBLIC_BACKEND_API_URL}
    depends_on:
      postgis:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL + PostGIS ───────────────────────
  postgis:
    image: postgis/postgis:16-3.4
    ports:
      - "4533:5432"
    container_name: keptcarbon-postgis
    networks:
      - keptcarbon
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-keptcarbon}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgis/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-keptcarbon}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    networks:
      - keptcarbon
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgis
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_NAME: ${POSTGRES_DB:-keptcarbon}
      PYTHONPATH: /app
    ports:
      - '8080:8000'
    volumes:
      - ./backend:/app
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

volumes:
  pgdata: