services:
  db:
    platform: linux/amd64 
    image: postgis/postgis:15-3.3-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: keptcarbon
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keptcarbon"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend  # Ensure this points to the folder containing your 'app' dir
    platform: linux/arm64
    depends_on:
      db:
        condition: service_healthy # Only starts once DB is ready
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: keptcarbon
      # Added PYTHONPATH to ensure app.services is discoverable
      PYTHONPATH: /app
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app # Useful for live code reloading during dev

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - '3000:80'

volumes:
  db-data: